# 1️⃣ Редирект с HTTP на HTTPS
server {
    listen 80;
    server_name rasulhub.fun www.rasulhub.fun;

    return 301 https://$host$request_uri;
}

# 2️⃣ HTTPS прокси на локальный backend
server {
    listen 443 ssl http2;
    server_name rasulhub.fun www.rasulhub.fun;
    client_max_body_size 200M;

    # SSL сертификаты (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/rasulhub.fun/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rasulhub.fun/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Проксирование всего трафика на локальный порт (например 3000)
    location / {
        proxy_pass http://127.0.0.1:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Прокси для API (если хотите отдельный путь)
    location /api/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
